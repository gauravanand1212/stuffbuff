name: toolshare
description: P2P Tool Rental Marketplace MVP

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_image_compress: ^2.1.0
  image_picker: ^1.0.7
  intl: ^0.19.0
  shimmer: ^3.0.0
  
  # Utils
  uuid: ^4.3.3
  path_provider: ^2.1.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/